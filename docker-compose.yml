services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prosync
      POSTGRES_PASSWORD: prosync123
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
